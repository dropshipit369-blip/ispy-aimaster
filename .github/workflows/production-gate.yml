# Application Name: iSpy-AI
# Application ID: ISPY-AI-PROD-CORE-001
# Application Version: 2.1.0-Release
# Application Owner: AI System Specialist
# Application Contact: sysadmin@ispy-ai.com

name: Production Gate

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Strict Type Check
        run: bun run tsc --noEmit

      - name: Lint
        run: bun run lint

      # ── SES §7 CI/CD Validation Gate ──────────────────────────────────────
      # FAIL if any test or source file references mock, sample, or synthetic
      # datasets. All testing must use tokenized, privacy-preserving slices of
      # production data. Active listings are also prohibited in the data pipeline.
      - name: Mock-Data Validation Gate
        run: |
          echo "Scanning for prohibited mock/synthetic data references..."
          FORBIDDEN_PATTERNS="mock_data|synthetic_data|sample_data|fake_data|dummy_data|test_fixture|MOCK_ITEM|FAKE_PRICE|SyntheticComparable|mock_comparable|active_listing_only"
          SEARCH_DIRS="src supabase/functions tests e2e"

          FOUND=0
          for DIR in $SEARCH_DIRS; do
            if [ -d "$DIR" ]; then
              MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
                -E "$FORBIDDEN_PATTERNS" "$DIR" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                echo "ERROR: Prohibited mock/synthetic data pattern found in $DIR:"
                echo "$MATCHES"
                FOUND=1
              fi
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "PIPELINE FAILED: Mock or synthetic data references detected."
            echo "All integration and staging tests must use tokenized, privacy-preserving"
            echo "slices of production data per SES §7 CI/CD Validation Gate."
            exit 1
          fi

          echo "Mock-data validation passed — no prohibited patterns detected."

      - name: E2E Integration (Live Connector - Staging)
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: bun x playwright test
